<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LionMode Elite | Road to Romania</title>
    <link rel="stylesheet" href="home-v8.css">
    <link rel="stylesheet" href="home-compact-v1.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="theme-body">
    <header class="site-header">
        <div class="top-bar">
            <div class="shell top-bar__inner">
                <div class="top-bar__contacts" id="top-bar-items"></div>
                <form class="top-bar__search" id="top-bar-search" action="#" role="search">
                    <input id="top-bar-search-input" type="search" placeholder="Search ..." aria-label="Search">
                    <button id="top-bar-search-button" type="submit" aria-label="Submit search">
                        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                    </button>
                </form>
            </div>
        </div>
        <div class="main-header">
            <div class="shell main-header__inner">
                <a class="site-brand" href="#journey" aria-label="Homepage">
                    <img id="brand-logo" src="home__lionmode-logo.webp" alt="LionMode Elite logo">
                    <div class="site-brand__text">
                        <span id="brand-name"></span>
                        <span id="brand-tag"></span>
                    </div>
                </a>
                <button class="menu-toggle" id="menu-toggle" type="button" aria-expanded="false" aria-controls="main-nav">
                    <i class="fa-solid fa-bars" aria-hidden="true"></i>
                    <span>Menu</span>
                </button>
                <nav class="main-nav" id="main-nav"></nav>
                <div class="header-actions">
                    <div class="header-socials" id="header-socials"></div>
                    <a class="login-pill" id="header-login" href="login.html">Login</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero-section" id="journey">
            <div class="hero-section__backdrop" id="hero-backdrop"></div>
            <div class="hero-section__overlay"></div>
            <div class="shell hero-section__inner">
                <div class="hero-panel" id="hero-panel">
                    <p class="hero-panel__eyebrow" id="hero-eyebrow"></p>
                    <h1 class="hero-panel__title" id="hero-title"></h1>
                    <h2 class="hero-panel__subtitle" id="hero-subtitle"></h2>
                    <div class="hero-panel__body" id="hero-body"></div>
                    <button class="hero-panel__toggle" id="hero-read-more" type="button" hidden aria-expanded="false">
                        Read more
                    </button>
                    <a class="hero-panel__cta primary-button" id="hero-button" href="login.html"></a>
                </div>
            </div>
        </section>

        <section class="login-section" id="login">
            <div class="shell login-section__inner">
                <div class="login-copy">
                    <p class="section-heading__eyebrow" id="login-eyebrow"></p>
                    <h2 id="login-title"></h2>
                    <p id="login-description"></p>
                </div>
                <a class="primary-button" id="login-button" href="login.html"></a>
            </div>
        </section>

        <section class="programs-section" id="lionmode">
            <div class="shell">
                <div class="section-heading">
                    <p class="section-heading__eyebrow" id="programs-eyebrow"></p>
                    <h2 id="programs-title"></h2>
                </div>
                <div class="program-cards" id="program-cards"></div>
            </div>
        </section>

        <section class="about-section">
            <div class="shell about-grid">
                <div class="about-media">
                    <img id="about-image" src="" alt="LionMode training image">
                </div>
                <div class="about-copy">
                    <p class="section-heading__eyebrow" id="about-eyebrow"></p>
                    <h2 id="about-title"></h2>
                    <p class="about-copy__intro" id="about-intro"></p>
                    <p class="about-copy__label" id="about-label"></p>
                    <ul class="about-list" id="about-list"></ul>
                    <p class="about-copy__closing" id="about-closing"></p>
                </div>
            </div>
        </section>

        <section class="benefits-section" id="benefits">
            <div class="shell">
                <div class="section-heading section-heading--center">
                    <p class="section-heading__eyebrow" id="benefits-eyebrow"></p>
                    <h2 id="benefits-title"></h2>
                </div>
                <div class="benefit-cards" id="benefit-cards"></div>
                <div class="benefit-details">
                    <article class="detail-panel" id="prep-panel">
                        <div class="detail-panel__media" id="prep-image"></div>
                        <h3 id="prep-title"></h3>
                        <ul id="prep-list"></ul>
                    </article>
                    <article class="detail-panel" id="camp-panel">
                        <div class="detail-panel__media" id="camp-image"></div>
                        <h3 id="camp-title"></h3>
                        <p id="camp-description"></p>
                    </article>
                    <article class="detail-panel" id="mental-panel">
                        <div class="detail-panel__media" id="mental-image"></div>
                        <h3 id="mental-title"></h3>
                        <p id="mental-description"></p>
                        <p class="detail-panel__label" id="mental-label"></p>
                        <ul id="mental-list"></ul>
                    </article>
                </div>
            </div>
        </section>

        <section class="expectations-section" id="expectations">
            <div class="shell expectations-grid">
                <article class="expectation-card" id="parent-card">
                    <div class="expectation-card__media" id="parent-image"></div>
                    <p class="expectation-card__eyebrow" id="parent-eyebrow"></p>
                    <h2 id="parent-title"></h2>
                    <p class="expectation-card__intro" id="parent-intro"></p>
                    <p class="expectation-card__label" id="parent-label"></p>
                    <ul id="parent-list"></ul>
                    <p class="expectation-card__closing" id="parent-closing"></p>
                </article>
                <article class="expectation-card" id="athlete-card">
                    <div class="expectation-card__media" id="athlete-image"></div>
                    <p class="expectation-card__eyebrow" id="athlete-eyebrow"></p>
                    <h2 id="athlete-title"></h2>
                    <p class="expectation-card__intro" id="athlete-intro"></p>
                    <p class="expectation-card__label" id="athlete-label"></p>
                    <ul id="athlete-list"></ul>
                    <p class="expectation-card__closing" id="athlete-closing"></p>
                </article>
            </div>
        </section>

        <section class="quote-section">
            <div class="shell quote-section__inner">
                <p id="quote-line-one"></p>
                <p id="quote-line-two"></p>
            </div>
        </section>

        <section class="roadmap-section" id="roadmap">
            <div class="shell">
                <div class="roadmap-intro">
                    <p class="section-heading__eyebrow" id="roadmap-eyebrow"></p>
                    <h2 id="roadmap-title"></h2>
                </div>
            </div>
            <div class="roadmap-page">
                <section class="roadmap-poster">
                    <div class="roadmap-poster__backdrop" id="poster-backdrop"></div>
                    <div class="roadmap-poster__scrim"></div>
                    <div class="roadmap-poster__content">
                        <div class="poster-top">
                            <div class="brand-lockup" id="brand-lockup"></div>
                            <div class="poster-hero-copy">
                                <p class="poster-hero-copy__pretitle" id="poster-pretitle"></p>
                                <h3 class="poster-hero-copy__title" id="poster-title"></h3>
                                <p class="poster-hero-copy__subtitle" id="poster-subtitle"></p>
                                <p class="poster-hero-copy__highlight" id="poster-highlight"></p>
                            </div>
                            <div class="hero-side">
                                <div class="hero-flag" id="hero-flag"></div>
                                <div class="hero-mantra" id="hero-mantra"></div>
                            </div>
                        </div>

                        <div class="timeline-visual" aria-hidden="true">
                            <svg class="timeline-road" viewBox="0 0 1400 180" preserveAspectRatio="none">
                                <path class="timeline-road__body" d="M20 126 C115 78, 210 78, 305 126 S495 174, 620 126 S840 78, 970 126 S1180 174, 1380 122"></path>
                                <path class="timeline-road__lane" d="M20 126 C115 78, 210 78, 305 126 S495 174, 620 126 S840 78, 970 126 S1180 174, 1380 122"></path>
                            </svg>
                            <div class="timeline-markers" id="timeline-markers"></div>
                        </div>

                        <div class="phase-grid" id="phase-grid"></div>

                        <div class="values-bar" id="values-bar"></div>

                        <p class="poster-note" id="poster-note"></p>
                    </div>
                </section>
            </div>
        </section>

        <section class="login-section login-section--bottom" id="login-bottom">
            <div class="shell login-section__inner">
                <div class="login-copy">
                    <p class="section-heading__eyebrow" id="login-eyebrow-bottom"></p>
                    <h2 id="login-title-bottom"></h2>
                    <p id="login-description-bottom"></p>
                </div>
                <a class="primary-button" id="login-button-bottom" href="login.html"></a>
            </div>
        </section>
    </main>

    <footer class="site-footer" id="footer">
        <div class="shell footer-inner">
            <div class="footer-brand">
                <img id="footer-logo" src="home__lionmode-logo.webp" alt="LionMode Elite logo">
                <div>
                    <strong id="footer-brand-name"></strong>
                    <span id="footer-brand-tag"></span>
                </div>
            </div>
            <nav class="footer-nav" id="footer-nav"></nav>
            <p class="footer-copy" id="footer-copy"></p>
        </div>
    </footer>

    <script src="site-defaults-v8.js"></script>
    <script src="index-v8.js"></script>
</body>
</html>
