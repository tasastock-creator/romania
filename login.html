<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – LionMode Elite</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <!-- Hero background for visual appeal -->
        <section class="login-hero">
            <div class="login-overlay">
                <h1>Login into your Profile</h1>
                <p>Sign in to continue your Road to Romania journey.</p>
                <div class="login-card">
                    <input type="text" id="login-username" placeholder="Name or Username">
                    <input type="password" id="login-password" placeholder="Password">
                    <button id="submit-login">Login</button>
                    <p id="login-error" class="error"></p>
                </div>
            </div>
        </section>
        <footer class="footer">
            <p>One team, one mission, one championship.</p>
        </footer>
    </div>
    <script src="login.js?v=2026-05-21-child-login-fix"></script>
</body>
</html>
