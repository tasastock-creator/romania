<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LionMode Elite – Road to Romania</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="landing-container">
        <!-- Hero / Intro Section -->
        <section class="intro">
            <h1 id="intro-title"></h1>
            <h2 id="intro-subtitle"></h2>
            <h3 id="intro-heading"></h3>
            <p id="intro-body"></p>
        </section>
        <!-- Program Section -->
        <section class="program">
            <h2 id="program-title"></h2>
            <p id="program-body"></p>
            <ul id="program-items"></ul>
            <p id="goal-text"></p>
        </section>
        <!-- Benefits Section -->
        <section class="benefits">
            <h2 id="benefits-title"></h2>
            <ul id="benefits-items"></ul>
            <h3>Tracking Dashboard</h3>
            <p>Parents and athletes will be able to monitor:</p>
            <ul id="tracking-items"></ul>
            <h3>Preparation Events</h3>
            <ul id="preparation-events"></ul>
            <p id="camp-description"></p>
            <h3 id="mental-support-title"></h3>
            <p id="mental-support-description"></p>
            <ul id="mental-support-items"></ul>
        </section>
        <!-- Expectations Section -->
        <section class="expectations">
            <div class="parent-exp">
                <h2 id="parent-title"></h2>
                <p id="parent-intro"></p>
                <ul id="parent-items"></ul>
                <p id="parent-closing"></p>
            </div>
            <div class="athlete-exp">
                <h2 id="athlete-title"></h2>
                <p id="athlete-intro"></p>
                <ul id="athlete-items"></ul>
                <p id="athlete-closing"></p>
            </div>
        </section>
        <!-- Roadmap Section -->
        <section class="roadmap">
            <h2 id="roadmap-title"></h2>
            <div id="phases-container"></div>
            <ul class="roadmap-footers" id="roadmap-footers"></ul>
        </section>
        <!-- Login Section -->
        <section class="login-section">
            <h2 id="login-title"></h2>
            <p id="login-description"></p>
            <input type="text" id="username" placeholder="Student Name">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login</button>
            <p id="login-error" class="error"></p>
        </section>
        <footer class="footer">
            <p>One team, one mission, one championship.</p>
        </footer>
    </div>
    <script src="landing.js"></script>
</body>
</html>
